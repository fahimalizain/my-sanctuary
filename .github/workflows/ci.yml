name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx format:check --base="remotes/origin/master"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx run-many -t lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx run-many -t test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx run-many -t typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx run-many -t build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npx nx build cloudflare-deploy

      # Write non-secret env vars from GitHub repository variables into wrangler.toml
      - run: |
          cat >> apps/cloudflare-deploy/wrangler.toml << 'EOF'

          [vars]
          FRONTEND_URL = "${{ vars.FRONTEND_URL }}"
          SECURE_COOKIE = "${{ vars.SECURE_COOKIE }}"
          EOF

      # Deploy first (required before secrets can be set)
      - run: npx nx deploy cloudflare-deploy

      # Push secrets from GitHub Secrets to Cloudflare Worker
      - run: echo "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET --cwd apps/cloudflare-deploy
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - run: echo "$GOOGLE_CREDENTIALS_JSON" | npx wrangler secret put GOOGLE_CREDENTIALS_JSON --cwd apps/cloudflare-deploy
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
